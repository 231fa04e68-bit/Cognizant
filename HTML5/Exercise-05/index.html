<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Community Event Portal - Registration</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f8fafc; }
        .form-card { max-width: 620px; margin: 2rem auto; padding: 1.75rem; background: white; border-radius: 16px; box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08); }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 0.9rem; margin-bottom: 1rem; border: 1px solid #cbd5e1; border-radius: 12px; }
        button { background: #2563eb; color: white; border: none; padding: 0.95rem 1.4rem; border-radius: 999px; cursor: pointer; }
        output { display: block; margin-top: 1rem; font-weight: bold; color: #065f46; }
    </style>
</head>
<body>
    <main class="form-card">
        <h1>Event Registration</h1>
        <form id="registrationForm" onsubmit="event.preventDefault(); submitRegistration();">
            <label for="name">Full Name</label>
            <input id="name" name="name" type="text" placeholder="Enter your full name" required autofocus>
            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="name@example.com" required>
            <label for="eventDate">Event Date</label>
            <input id="eventDate" name="eventDate" type="date" required>
            <label for="eventType">Event Type</label>
            <select id="eventType" name="eventType" required>
                <option value="">Select an event</option>
                <option value="cleanup">Community Cleanup</option>
                <option value="workshop">Skills Workshop</option>
                <option value="festival">Neighborhood Festival</option>
            </select>
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="4" placeholder="Tell us why you’d like to attend"></textarea>
            <button type="submit">Register</button>
            <output id="confirmOutput" name="confirmOutput"></output>
        </form>
    </main>
    <script>
        function submitRegistration() {
            const name = document.getElementById('name').value;
            const eventType = document.getElementById('eventType').value;
            const output = document.getElementById('confirmOutput');
            output.textContent = `Thank you, ${name}. Your registration for ${eventType || 'an event'} is received.`;
        }
    </script>
</body>
</html>
